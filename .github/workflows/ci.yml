name: CI Validation

# Trigger this workflow on every Pull Request to main,
# and every time someone pushes directly to main.
on:
    pull_request:
        branches: [main]
    push:
        branches: [main]

jobs:
    quality-gate:
        name: Full Quality & Security Audit
        runs-on: ubuntu-latest

        steps:
            - name: 1. Checkout Code
              uses: actions/checkout@v4

            - name: 2. Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 'lts/krypton' # Use the latest LTS version of Node.js
                  cache: 'npm' # This speeds up future runs by minutes

            - name: 3. Install Dependencies
              run: npm ci

            - name: 4. Dependency Security Audit
              # This checks for known vulnerabilities in your npm packages
              run: npm audit --audit-level=high

            - name: 5. Static Analysis (Trivy FS Scan)
              uses: aquasecurity/trivy-action@6e7b7d1efe3b17409247657989d9774641e77f0d # Matches a verified release
              with:
                  scan-type: 'fs'
                  scan-ref: '.'
                  exit-code: '1'
                  severity: 'CRITICAL,HIGH'

            - name: 6. Check Formatting (Prettier)
              run: npx prettier --check .

            - name: 7. Linting (ESLint)
              run: npm run lint

            - name: 8. Static Type Check (TypeScript)
              run: npx tsc --noEmit

            - name: 9. Run Unit Tests
              # This assumes you have a 'test' script in package.json
              # If you don't have tests yet, this will skip gracefully
              run: npm test --if-present

            - name: 10. Production Smoke Build
              run: npm run build
              env:
                  NODE_ENV: production
