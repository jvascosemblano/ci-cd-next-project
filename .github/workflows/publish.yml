name: Build and Publish Container

# ONLY trigger when code is merged or pushed directly to the main branch
on:
    push:
        branches: [main]

# We need to give GitHub Actions permission to upload to the GHCR registry
permissions:
    contents: read
    packages: write
    id-token: write # Required for keyless signing!

jobs:
    build-and-push:
        name: Build, Scan, and Publish
        runs-on: ubuntu-latest

        steps:
            - name: 1. Checkout Code
              uses: actions/checkout@v4

            - name: 2. Install Cosign
              uses: sigstore/cosign-installer@v3.4.0

            - name: 3. Authenticate to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: 4. Setup Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: 5. Build the Docker Image
              uses: docker/build-push-action@v5
              with:
                  context: .
                  push: false
                  load: true
                  tags: ghcr.io/${{ github.repository }}:${{ github.sha }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: 6. Security Scan (Trivy Image Scan)
              uses: aquasecurity/trivy-action@v0.35.0
              with:
                  image-ref: 'ghcr.io/${{ github.repository }}:${{ github.sha }}'
                  format: 'table'
                  exit-code: '1'
                  ignore-unfixed: true
                  vuln-type: 'os,library'
                  severity: 'CRITICAL,HIGH'

            - name: 7. Push Image to Registry
              run: docker push ghcr.io/${{ github.repository }}:${{ github.sha }}

            - name: 8. Sign the published Docker image
              # This step runs ONLY if the image was successfully pushed
              env:
                  TAGS: ghcr.io/${{ github.repository }}:${{ github.sha }}
              run: |
                  cosign sign --yes ${TAGS}

            - name: 9. Generate SBOM
              uses: anchore/sbom-action@v0
              with:
                  image: ghcr.io/${{ github.repository }}:${{ github.sha }}
                  format: spdx-json
                  output-file: sbom.json

            - name: 10. Upload SBOM as Artifact
              uses: actions/upload-artifact@v4
              with:
                  name: sbom
                  path: sbom.json

            - name: 11. GitOps Handshake (Update Helm Values)
              run: |
                  # 1. Clone the Infra Repo
                  git clone https://x-access-token:${{ secrets.INFRA_REPO_TOKEN }}@github.com/${{ github.repository_owner }}/ci-cd-infra.git
                  cd ci-cd-infra/ci-cd-next-project

                  # 2. Use yq to update only the image.tag field
                  # We use the Git SHA to ensure absolute traceability
                  yq -i '.image.tag = "${{ github.sha }}"' values.yaml

                  # 3. Commit and Push
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add values.yaml
                  git commit -m "deploy: update helm tag to ${{ github.sha }} [skip ci]"
                  git push origin main
