name: Build and Publish Container

# ONLY trigger when code is merged or pushed directly to the main branch
on:
    push:
        branches: [main]

# We need to give GitHub Actions permission to upload to the GHCR registry
permissions:
    contents: read
    packages: write

jobs:
    build-and-push:
        name: Build, Scan, and Publish
        runs-on: ubuntu-latest

        steps:
            - name: 1. Checkout Code
              uses: actions/checkout@v4

            - name: 2. Authenticate to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }} # Built-in token, no setup required!

            - name: 3. Setup Docker Buildx
              # Buildx is a modern Docker engine that handles caching better
              uses: docker/setup-buildx-action@v3

            - name: 4. Build the Docker Image
              uses: docker/build-push-action@v5
              with:
                  context: .
                  push: false # We don't push yet! We need to scan it first.
                  load: true # Keep the image on the runner so Trivy can see it
                  tags: ghcr.io/${{ github.repository }}:${{ github.sha }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: 5. Security Scan (Trivy Image Scan)
              uses: aquasecurity/trivy-action@v0.35.0
              with:
                  image-ref: 'ghcr.io/${{ github.repository }}:${{ github.sha }}'
                  format: 'table'
                  exit-code: '1' # Fail the workflow if critical vulnerabilities exist
                  ignore-unfixed: true
                  vuln-type: 'os,library'
                  severity: 'CRITICAL,HIGH'

            - name: 6. Push Image to Registry
              # If Step 5 passes, we finally upload the image
              run: docker push ghcr.io/${{ github.repository }}:${{ github.sha }}

            - name: 7. Generate SBOM (Ingredients List)
              # We generate the nutrition label for compliance
              uses: anchore/sbom-action@v0
              with:
                  image: ghcr.io/${{ github.repository }}:${{ github.sha }}
                  format: spdx-json
                  output-file: sbom.json

            - name: 8. Upload SBOM as Artifact
              uses: actions/upload-artifact@v4
              with:
                  name: sbom
                  path: sbom.json
